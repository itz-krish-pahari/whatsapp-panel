<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WhatsApp Panel – Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #25D366;
      --dark-green: #128C7E;
      --bg: #0f1117;
      --card: #1a1f2e;
      --border: #2d3454;
      --text: #e8eaf0;
      --muted: #8892b0;
    }
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      background-image: radial-gradient(ellipse at 20% 50%, rgba(37,211,102,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(18,140,126,0.06) 0%, transparent 50%);
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .logo-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--green), var(--dark-green));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .logo-text h1 { font-size: 22px; font-weight: 700; }
    .logo-text p { font-size: 12px; color: var(--muted); }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 8px; }
    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--green); }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--green), var(--dark-green));
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.98); }
    .error-msg {
      background: rgba(255,80,80,0.1);
      border: 1px solid rgba(255,80,80,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #ff6b6b;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">💬</div>
      <div class="logo-text">
        <h1>WA Panel</h1>
        <p>WhatsApp Management System</p>
      </div>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="admin" autofocus />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
    </div>
    <button class="btn-login" onclick="login()">Sign In</button>
    <div class="error-msg" id="error"></div>
  </div>
  <script>
    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const err = document.getElementById('error');
      err.style.display = 'none';
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/';
        } else {
          err.textContent = data.message || 'Login failed';
          err.style.display = 'block';
        }
      } catch (e) {
        err.textContent = 'Connection error';
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
